name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Always-on structural checks — no Unity license needed.
  # Runs on the runner's default catthehacker image (node available for actions).
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON (asmdefs, manifest, inputactions)
        run: |
          set -e
          for f in $(find Assets Packages -name '*.asmdef' -o -name 'manifest.json' -o -name '*.inputactions'); do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || { echo "INVALID JSON: $f"; exit 1; }
            echo "ok: $f"
          done
      - name: Check asmdef layering (Simulation must stay pure)
        run: |
          set -e
          node -e '
            const refs = JSON.parse(require("fs").readFileSync("Assets/_Project/Code/Simulation/BB.Simulation.asmdef","utf8")).references;
            console.log("BB.Simulation references:", refs);
            const banned = ["BB.Core","BB.UI","BB.Netcode","BB.Presentation","Unity.InputSystem"];
            const bad = refs.filter(r => banned.includes(r));
            if (bad.length) { console.error("LAYERING VIOLATION: BB.Simulation →", bad); process.exit(1); }
          '
      - name: Forbid device/time reads inside BB.Simulation
        run: |
          set -e
          if grep -rnE 'UnityEngine\.Input\.|Time\.deltaTime|InputSystem' Assets/_Project/Code/Simulation --include='*.cs'; then
            echo "BB.Simulation must consume InputSnapshot only (netcode/rollback contract)"; exit 1
          fi
          echo "simulation purity ok"
