name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Always-on structural checks — no Unity license needed.
  validate:
    runs-on: docker
    container:
      image: alpine:3.20
    steps:
      - name: Install tools
        run: apk add --no-cache git jq python3 bash
      - uses: actions/checkout@v4
      - name: Validate JSON (asmdefs, manifest, inputactions)
        run: |
          set -e
          for f in $(find Assets Packages -name '*.asmdef' -o -name 'manifest.json' -o -name '*.inputactions'); do
            jq empty "$f" || { echo "INVALID JSON: $f"; exit 1; }
            echo "ok: $f"
          done
      - name: Check asmdef layering (Simulation must not reference Core/UI/Netcode/Presentation)
        run: |
          set -e
          refs=$(jq -r '.references[]' Assets/_Project/Code/Simulation/BB.Simulation.asmdef)
          echo "BB.Simulation references: $refs"
          for bad in BB.Core BB.UI BB.Netcode BB.Presentation Unity.InputSystem; do
            echo "$refs" | grep -qx "$bad" && { echo "LAYERING VIOLATION: BB.Simulation → $bad"; exit 1; } || true
          done
      - name: Forbid device/time reads inside BB.Simulation
        run: |
          set -e
          if grep -rnE 'UnityEngine\.Input\.|Time\.deltaTime|InputSystem' Assets/_Project/Code/Simulation --include='*.cs'; then
            echo "BB.Simulation must consume InputSnapshot only (netcode/rollback contract)"; exit 1
          fi
          echo "simulation purity ok"

  # Unity compile + EditMode tests. Off until the Personal license secret is
  # provisioned: set repo variable UNITY_CI_ENABLED=true and secret UNITY_LICENSE
  # (contents of the .ulf) to enable. See docs/PLAN.md §VCS & CI.
  unity-tests:
    runs-on: docker
    if: ${{ vars.UNITY_CI_ENABLED == 'true' }}
    container:
      image: unityci/editor:ubuntu-6000.0.47f1-linux-il2cpp-3
    steps:
      - uses: actions/checkout@v4
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: unity-library-${{ hashFiles('Packages/manifest.json') }}
      - name: Activate license
        run: |
          mkdir -p ~/.local/share/unity3d/Unity
          echo "$UNITY_LICENSE" > ~/.local/share/unity3d/Unity/Unity_lic.ulf
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      - name: EditMode tests
        run: |
          unity-editor -batchmode -projectPath . -logFile - \
            -runTests -testPlatform EditMode -testResults /tmp/results.xml || status=$?
          cat /tmp/results.xml || true
          exit ${status:-0}
